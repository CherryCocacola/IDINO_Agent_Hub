plugins:
  # CORS configuration
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - X-Requested-With
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600

  # Rate limiting
  - name: rate-limiting
    config:
      minute: 100
      policy: local

  # Request/Response logging
  - name: file-log
    config:
      path: /tmp/kong.log
      reopen: true
