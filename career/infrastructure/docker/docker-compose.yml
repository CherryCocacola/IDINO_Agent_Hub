      - DB_SCHEMA=idino_career
      - AUTH_SERVICE_URL=http://auth-service:8011
      - STUDENT_SERVICE_URL=http://student-service:8002
      - COMPETENCY_SERVICE_URL=http://competency-service:8003
      - LOG_LEVEL=INFO
    ports:
