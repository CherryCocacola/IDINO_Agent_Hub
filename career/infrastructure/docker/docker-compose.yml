version: '3.9'

services:
  # ============================================
  # Infrastructure Services
  # ============================================

  postgres:
    image: pgvector/pgvector:pg17
    container_name: idino_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2012
      POSTGRES_DB: idino_career
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./dump:/dump
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - idino_network

  redis:
    image: redis:7-alpine
    container_name: idino_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - idino_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: idino_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - idino_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: idino_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - idino_network

  # ============================================
  # API Gateway
  # ============================================

  kong:
    image: kong:3.5
    container_name: idino_kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ../../gateway/kong.yml:/kong/declarative/kong.yml:ro
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    depends_on:
      - auth-service
      - student-service
      - competency-service
      - alumni-service
      - ai-service
      - skill-service
      - opportunity-service
      - coaching-service
      - risk-service
      - badge-service
      - simulation-service
      - advisor-service
      - roadmap-service
      - portfolio-service
      - privacy-service
      - worknet-service
      - integration-service
      - notification-service
    networks:
      - idino_network

  # ============================================
  # Core Services
  # ============================================

  auth-service:
    build:
      context: ../..
      dockerfile: services/auth-service/Dockerfile
    container_name: idino_auth
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=idino_career
      - DB_USER=postgres
      - DB_PASSWORD=2012
      - DB_SCHEMA=idino_career
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-key-change-me}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
      - LOG_LEVEL=INFO
    ports:
      - "8011:8011"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - idino_network
    restart: unless-stopped

  student-service:
    build:
      context: ../..
      dockerfile: services/student-service/Dockerfile
    container_name: idino_student
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=idino_career
      - DB_USER=postgres
      - DB_PASSWORD=2012
      - DB_SCHEMA=idino_career
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - AUTH_SERVICE_URL=http://auth-service:8011
      - LOG_LEVEL=INFO
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - idino_network
    restart: unless-stopped

  competency-service:
