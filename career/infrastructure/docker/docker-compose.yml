      - DB_SCHEMA=idino_career
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - AUTH_SERVICE_URL=http://auth-service:8011
      - STUDENT_SERVICE_URL=http://student-service:8002
      - AI_SERVICE_URL=http://ai-service:8006
      - LOG_LEVEL=INFO
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
