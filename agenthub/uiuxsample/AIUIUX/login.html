<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 통합관리시스템 - 로그인</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="assets/css/login.css" rel="stylesheet">
</head>
<body class="lg-body">

  <!-- Background decoration -->
  <div class="lg-bg-orb lg-orb1"></div>
  <div class="lg-bg-orb lg-orb2"></div>
  <div class="lg-bg-orb lg-orb3"></div>

  <div class="lg-wrap">

    <!-- Logo area -->
    <div class="lg-logo-area">
      <div class="lg-logo-icon">
        <i class="fas fa-brain"></i>
      </div>
      <div class="lg-logo-text">
        <span class="lg-brand">AI Manager</span>
        <span class="lg-brand-sub">통합관리시스템</span>
      </div>
    </div>

    <!-- Card -->
    <div class="lg-card">
      <div class="lg-card-inner">

        <!-- Header -->
        <div class="lg-header">
          <h2 class="lg-title">로그인</h2>
          <p class="lg-subtitle">계정에 로그인하여 계속 진행하세요</p>
        </div>

        <!-- Alert -->
        <div class="lg-alert" id="lgAlert" style="display:none;">
          <i class="fas fa-circle-exclamation"></i>
          <span id="lgAlertText"></span>
        </div>

        <!-- Form -->
        <form id="lgForm" novalidate autocomplete="on">

          <div class="lg-field">
            <label class="lg-label" for="lgEmail">이메일</label>
            <div class="lg-input-wrap">
              <i class="fas fa-envelope lg-input-icon"></i>
              <input
                type="email"
                class="lg-input"
                id="lgEmail"
                placeholder="이메일을 입력하세요"
                autocomplete="email"
                required
              >
            </div>
            <span class="lg-field-err" id="lgEmailErr"></span>
          </div>

          <div class="lg-field">
            <div class="lg-label-row">
              <label class="lg-label" for="lgPassword">비밀번호</label>
              <a href="#" class="lg-forgot" id="lgForgotLink">비밀번호를 잊으셨나요?</a>
            </div>
            <div class="lg-input-wrap">
              <i class="fas fa-lock lg-input-icon"></i>
              <input
                type="password"
                class="lg-input"
                id="lgPassword"
                placeholder="비밀번호를 입력하세요"
                autocomplete="current-password"
                required
              >
              <button type="button" class="lg-pw-toggle" id="lgPwToggle" tabindex="-1" title="비밀번호 보기">
                <i class="fas fa-eye" id="lgPwIcon"></i>
              </button>
            </div>
            <span class="lg-field-err" id="lgPasswordErr"></span>
          </div>

          <div class="lg-remember-row">
            <label class="lg-check-label" for="lgRemember">
              <input type="checkbox" class="lg-check" id="lgRemember">
              <span class="lg-check-box"></span>
              <span class="lg-check-text">로그인 상태 유지</span>
            </label>
          </div>

          <button type="submit" class="lg-submit-btn" id="lgSubmitBtn">
            <span id="lgSubmitText">로그인</span>
            <div class="lg-submit-spinner" id="lgSubmitSpinner" style="display:none;"></div>
          </button>

        </form>

        <!-- Divider -->
        <div class="lg-divider">
          <span>또는</span>
        </div>

        <!-- SSO buttons -->
        <div class="lg-sso-group">
          <button type="button" class="lg-sso-btn" id="lgSsoGoogle">
            <i class="fab fa-google"></i>
            <span>Google로 로그인</span>
          </button>
          <button type="button" class="lg-sso-btn" id="lgSsoMicrosoft">
            <i class="fab fa-microsoft"></i>
            <span>Microsoft로 로그인</span>
          </button>
        </div>

      </div>
    </div>

    <!-- Footer -->
    <p class="lg-footer-text">
      © 2025 AI Manager. All rights reserved.
    </p>

  </div>

  <!-- Forgot PW Modal -->
  <div class="lg-modal-overlay" id="lgForgotModal">
    <div class="lg-modal">
      <div class="lg-modal-header">
        <div class="lg-modal-icon"><i class="fas fa-envelope-open-text"></i></div>
        <div>
          <h5>비밀번호 재설정</h5>
          <p>등록된 이메일로 재설정 링크를 보내드립니다</p>
        </div>
        <button class="lg-modal-close" id="lgForgotClose"><i class="fas fa-xmark"></i></button>
      </div>
      <div class="lg-modal-body">
        <div class="lg-field">
          <label class="lg-label">이메일 주소</label>
          <div class="lg-input-wrap">
            <i class="fas fa-envelope lg-input-icon"></i>
            <input type="email" class="lg-input" id="lgForgotEmail" placeholder="가입한 이메일을 입력하세요">
          </div>
        </div>
      </div>
      <div class="lg-modal-footer">
        <button class="lg-modal-cancel" id="lgForgotCancel">취소</button>
        <button class="btn btn-primary" id="lgForgotSubmit">
          <i class="fas fa-paper-plane me-2"></i>재설정 링크 전송
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="lg-toast" id="lgToast">
    <i class="fas fa-check-circle"></i>
    <span id="lgToastText"></span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
