###############################################################################
# Document Utilization System - Docker Compose
# ---------------------------------------------------------------------------
# Usage:
#   1. Copy .env.example to .env and fill in values.
#   2. docker compose up -d
#   3. (Optional) Enable GPU services by uncommenting the relevant blocks
#      at the bottom of this file.
#
# Ports exposed to the host (defaults):
#   80/443  - nginx reverse proxy
#   3002    - Next.js frontend
#   3001    - Grafana
#   5432    - PostgreSQL
#   5555    - Flower (Celery monitoring)
#   5672    - RabbitMQ (AMQP)
#   6333    - Qdrant (vector DB)
#   6379    - Redis
#   8000    - FastAPI backend
#   9000    - MinIO API
#   9001    - MinIO Console
#   9090    - Prometheus
#   15672   - RabbitMQ Management UI
###############################################################################

services:
  # -------------------------------------------------------------------------
  # Frontend - Next.js
  # -------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api/v1
        - NEXT_PUBLIC_WS_URL=/api/v1
        - API_URL=http://api:8000
        # 트랙 A1 Phase E (2026-05-26): DocUtil 운영자 페이지 → AgentHub 콘솔 redirect
        - NEXT_PUBLIC_AGENTHUB_URL=${NEXT_PUBLIC_AGENTHUB_URL:-http://192.168.10.39:64005}
    container_name: docutil-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3002}:3002"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - docutil-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:3002"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # -------------------------------------------------------------------------
  # API - FastAPI
  # -------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docutil-api
    restart: unless-stopped
    ports:
      - "8040:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/${REDIS_DB:-0}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/${RABBITMQ_VHOST:-/}
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/${RABBITMQ_VHOST:-/}
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/${REDIS_CELERY_DB:-1}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - VLLM_URL=${VLLM_URL:-http://vllm:8001/v1}
      - EMBEDDING_SERVICE_URL=${EMBEDDING_SERVICE_URL:-http://embedding:8002}
      - RERANKER_URL=${RERANKER_URL:-http://reranker:8003/v1}
    volumes:
      - api-tmp:/tmp/docutil
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - docutil-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # -------------------------------------------------------------------------
  # Celery Worker - Document Processing
  # -------------------------------------------------------------------------
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A app.workers worker
      --loglevel=info
      --concurrency=${CELERY_WORKER_CONCURRENCY:-4}
      --max-tasks-per-child=${CELERY_MAX_TASKS_PER_CHILD:-100}
      -Q default,document_processing,embedding,report_generation,document_export,evaluation
      -n worker@%h
    restart: unless-stopped
    deploy:
      replicas: ${CELERY_WORKER_REPLICAS:-2}
      resources:
        limits:
          memory: ${CELERY_WORKER_MEMORY_LIMIT:-2G}
        reservations:
          memory: 512M
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/${REDIS_DB:-0}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/${RABBITMQ_VHOST:-/}
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/${RABBITMQ_VHOST:-/}
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/${REDIS_CELERY_DB:-1}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - VLLM_URL=${VLLM_URL:-http://vllm:8001/v1}
      - EMBEDDING_SERVICE_URL=${EMBEDDING_SERVICE_URL:-http://embedding:8002}
      - RERANKER_URL=${RERANKER_URL:-http://reranker:8003/v1}
    volumes:
      - api-tmp:/tmp/docutil
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - docutil-network
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers inspect ping --timeout 10 || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s

  # -------------------------------------------------------------------------
  # Celery Beat - Periodic Task Scheduler
  # -------------------------------------------------------------------------
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docutil-celery-beat
    command: >
      celery -A app.workers beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
      --pidfile=/tmp/celerybeat.pid
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/${REDIS_DB:-0}
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/${RABBITMQ_VHOST:-/}
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/${REDIS_CELERY_DB:-1}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - docutil-network
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers inspect ping --timeout 10 || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s

  # -------------------------------------------------------------------------
  # Flower - Celery Monitoring Dashboard
  # -------------------------------------------------------------------------
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docutil-flower
    command: >
      celery -A app.workers flower
      --port=5555
      --broker_api=http://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:15672/api/
      --basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme}
      --persistent=true
      --db=/data/flower.db
    restart: unless-stopped
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/${RABBITMQ_VHOST:-/}
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/${REDIS_CELERY_DB:-1}
    volumes:
      - flower-data:/data
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - docutil-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5555/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # -------------------------------------------------------------------------
  # PostgreSQL 17
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: docutil-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - docutil-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    shm_size: "256mb"
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c maintenance_work_mem=128MB
        -c max_connections=200
        -c work_mem=4MB
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c log_min_duration_statement=1000
        -c log_statement=ddl

  # -------------------------------------------------------------------------
  # Qdrant - Vector Database
  # -------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.16.0
    container_name: docutil-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
      - QDRANT__STORAGE__SNAPSHOTS_PATH=/qdrant/snapshots
      - QDRANT__LOG_LEVEL=INFO
    volumes:
      - qdrant-data:/qdrant/storage
      - qdrant-snapshots:/qdrant/snapshots
    networks:
      - docutil-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  # -------------------------------------------------------------------------
  # Redis 7
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: docutil-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory ${REDIS_MAXMEMORY:-512mb}
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
        --save 900 1
        --save 300 10
        --save 60 10000
    volumes:
      - redis-data:/data
    networks:
      - docutil-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------------------------
  # RabbitMQ 4.0
  # -------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: docutil-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      - docutil-network
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_local_alarms"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # -------------------------------------------------------------------------
  # MinIO - Object Storage
  # -------------------------------------------------------------------------
  minio:
    # CLAUDE.md 서버 노트: Ubuntu 서버(192.168.10.39)의 Xeon E5-2620 v4 가 x86-64-v2 미지원.
    # `minio/minio:latest` 사용 시 "Fatal glibc error: CPU does not support x86-64-v2".
    # 반드시 quay.io 의 2023-09-04 릴리즈로 pin (트랙 A1 Phase E 2026-05-26 회귀 fix).
    image: quay.io/minio/minio:RELEASE.2023-09-04T19-57-37Z
    container_name: docutil-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BROWSER_REDIRECT_URL=${MINIO_BROWSER_REDIRECT_URL:-http://localhost:9001}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - docutil-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  # -------------------------------------------------------------------------
  # Nginx - Reverse Proxy
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: docutil-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - docutil-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://127.0.0.1:80/ || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # -------------------------------------------------------------------------
  # Prometheus - Metrics Collection
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: docutil-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - docutil-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # -------------------------------------------------------------------------
  # Grafana - Observability Dashboard
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    container_name: docutil-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3001}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
      - GF_LOG_LEVEL=warn
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - docutil-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # -------------------------------------------------------------------------
  # Loki - Log Aggregation
  # -------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.3.0
    container_name: docutil-loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - docutil-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  ###########################################################################
