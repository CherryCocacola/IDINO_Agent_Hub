# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  postgres-data:
    name: docutil-postgres-data
  qdrant-data:
    name: docutil-qdrant-data
  qdrant-snapshots:
    name: docutil-qdrant-snapshots
  redis-data:
    name: docutil-redis-data
  rabbitmq-data:
    name: docutil-rabbitmq-data
  minio-data:
    name: docutil-minio-data
  api-tmp:
    name: docutil-api-tmp
  flower-data:
    name: docutil-flower-data
  prometheus-data:
    name: docutil-prometheus-data
  grafana-data:
    name: docutil-grafana-data
  loki-data:
    name: docutil-loki-data
  nginx-logs:
    name: docutil-nginx-logs
  # Uncomment when enabling GPU services:
  # embedding-model-cache:
  #   name: docutil-embedding-model-cache
  # vllm-model-cache:
  #   name: docutil-vllm-model-cache
  # reranker-model-cache:
  #   name: docutil-reranker-model-cache

# ==========================================================================
# Networks
# ==========================================================================
networks:
  docutil-network:
    name: docutil-network
