# =============================================================================
# DocUtil — Deploy to Ubuntu Server (192.168.10.39)
# =============================================================================
# Trigger: push to main (only after CI passes)
#
# Required GitHub Secrets:
#   SSH_HOST          — server IP (e.g. 192.168.10.39)
#   SSH_USER          — SSH username (e.g. idino)
#   SSH_PRIVATE_KEY   — SSH private key (ed25519 or RSA)
#
# CRITICAL: MinIO image MUST be pinned to RELEASE.2023-09-04T19-57-37Z
#   because the server CPU (Xeon E5-2620 v4) does NOT support x86-64-v2
#   instructions required by newer MinIO releases.
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]

# Only one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Wait for CI to pass first
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    runs-on: ubuntu-latest
    needs: [ci]
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /home/${{ secrets.SSH_USER }}/docutil

            echo "=== 1. Git pull ==="
            git pull origin main

            # -----------------------------------------------------------------
            # CRITICAL: Fix MinIO image version for Xeon E5-2620 v4
            # Server CPU does NOT support x86-64-v2 instructions.
            # Newer MinIO images crash with "Illegal instruction".
            # -----------------------------------------------------------------
            echo "=== 2. Fix MinIO image (x86-64-v2 incompatible) ==="
            sed -i 's|image: quay.io/minio/minio:.*|image: quay.io/minio/minio:RELEASE.2023-09-04T19-57-37Z|' docker-compose.yml

            echo "=== 3. Build & restart backend + worker ==="
            docker compose up -d --build api celery-worker

            echo "=== 4. Clean Docker build cache ==="
            docker builder prune -af

            echo "=== 5. Rebuild frontend (no cache) ==="
            docker compose build --no-cache frontend

            echo "=== 6. Restart frontend + nginx ==="
            docker compose up -d --force-recreate frontend nginx

            echo "=== 7. Health check ==="
            sleep 5
            curl -sf http://localhost:8000/health || echo "WARNING: API health check failed"
            curl -sf http://localhost:3002 || echo "WARNING: Frontend health check failed"

            echo "=== Deploy complete ==="
