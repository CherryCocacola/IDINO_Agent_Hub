<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 메인 컨테이너 -->
    <div class="container">
        <!-- 로고 -->
        <div class="logo">
            <span class="logo-g">G</span>
            <span class="logo-o1">o</span>
            <span class="logo-o2">o</span>
            <span class="logo-g2">g</span>
            <span class="logo-l">l</span>
            <span class="logo-e">e</span>
        </div>

        <!-- 검색창 -->
        <div class="search-container">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20">
                    <path fill="#9aa0a6" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" class="search-input" placeholder="">
                <svg class="mic-icon" viewBox="0 0 24 24" width="24" height="24">
                    <path fill="#4285f4" d="m12 15c1.66 0 3-1.31 3-2.97v-7.02c0-1.66-1.34-3.01-3-3.01s-3 1.34-3 3.01v7.02c0 1.66 1.34 2.97 3 2.97z"/>
                    <path fill="#34a853" d="m11 18.08h2v3.92h-2z"/>
                    <path fill="#fbbc05" d="m7.05 16.81c-.3-.92-.45-1.9-.45-2.91 0-3.02 1.64-5.68 4.15-7.15v-2.02c-3.51 1.31-6.05 4.65-6.05 8.5 0 1.75.45 3.39 1.22 4.81l3.13-1.23z"/>
                    <path fill="#ea4335" d="m14.88 11.9c0 1.01-.15 1.99-.45 2.91l3.13 1.23c.77-1.42 1.22-3.06 1.22-4.81 0-3.85-2.54-7.19-6.05-8.5v2.02c2.51 1.47 4.15 4.13 4.15 7.15z"/>
                </svg>
            </div>
            
            <!-- 버튼 -->
            <div class="buttons">
                <button class="search-button">Google 검색</button>
                <button class="search-button">다행히도</button>
            </div>
        </div>

        <!-- 언어 선택 -->
        <div class="language">
            한국어로 제공됨
        </div>
    </div>

    <!-- 하단 푸터 -->
    <footer class="footer">
        <div class="footer-top">
            <span class="footer-location">대한민국</span>
        </div>
        <div class="footer-bottom">
            <a href="#" class="footer-link">광고</a>
            <a href="#" class="footer-link">비즈니스</a>
            <a href="#" class="footer-link">검색 방식</a>
            <a href="#" class="footer-link">개인정보처리방침</a>
            <a href="#" class="footer-link">이용약관</a>
            <a href="#" class="footer-link">설정</a>
        </div>
    </footer>
</body>
</html>
